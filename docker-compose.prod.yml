services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    container_name: sppd_update_app
    restart: unless-stopped
    ports:
      - "8004:8000"
    depends_on:
      - db
    command: >
      sh -c "
        mkdir -p /app/storage/app/private /app/storage/app/public &&
        chown -R www-data:www-data /app/storage &&
        chmod -R 775 /app/storage &&
        php artisan serve --host=0.0.0.0 --port=8000
      "
    networks:
      - app_net
    volumes:
      - ./storage/app:/app/storage/app
      - .env:/app/.env
      - ./docker/php.ini:/usr/local/etc/php/conf.d/uploads.ini

  db:
    image: mysql:8.0
    container_name: sppd_update_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: db_sppd_update
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - app_net

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: sppd_update_phpmyadmin
    ports:
      - "8084:80"
    environment:
      - PMA_HOST=db
      - PMA_USER=root
      - PMA_PASSWORD=root
    depends_on:
      - db
    networks:
      - app_net

networks:
  app_net:


volumes:
  dbdata:
